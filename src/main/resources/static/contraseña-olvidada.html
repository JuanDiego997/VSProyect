<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Olvidé mi contraseña</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/public/css/contrasenaolvidada.css" />
  </head>

  <body class="d-flex align-items-center justify-content-center">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
          <div class="mb-4 text-start">
            <a href="login.html" class="btn btn-outline-light btn-sm">
              <i class="bi bi-arrow-left me-1"></i> Volver al login
            </a>
          </div>

          <div class="recover-container">
            <h2 class="text-center mb-4 fw-bold">Recuperar contraseña</h2>
            <p class="text-center mb-4">
              Ingresa tu correo y te enviaremos un enlace para restablecerla
            </p>

            <form id="recoverForm">
              <div class="mb-3">
                <input
                  name="email"
                  type="email"
                  class="form-control form-control-lg"
                  placeholder="Correo electrónico"
                  required
                />
              </div>
              <div class="d-grid mb-3">
                <button type="submit" class="btn btn-primary btn-lg">
                  Enviar enlace
                </button>
              </div>
            </form>

            <p class="text-center mt-3">
              ¿Recordaste tu contraseña?
              <a href="login.html" class="text-decoration-none"
                >Iniciar sesión</a
              >
            </p>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/public/js/contrasenaolvidad.js"></script>
  </body>
</html>
